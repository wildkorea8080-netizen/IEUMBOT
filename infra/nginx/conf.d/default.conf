server {
  listen 80;
  server_name _;

  location /admin {
    proxy_pass http://web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
  }

  location / {
    return 200 "IEUMBOT Nginx scaffold";
    add_header Content-Type text/plain;
  }
}

