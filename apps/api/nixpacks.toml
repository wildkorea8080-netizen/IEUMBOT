[phases.setup]
aptPkgs = ["poppler-utils", "tesseract-ocr", "tesseract-ocr-eng", "tesseract-ocr-kor"]

# Playwright용 Chromium + 시스템 라이브러리 설치 (install 단계 이후 자동 실행).
# USE_PLAYWRIGHT_FETCH=true 일 때 JS 챌린지·렌더링 사이트 크롤에 사용.
# 실패해도 배포가 깨지지 않게 '|| true' — 미설치 시 Playwright tier만 비활성(무회귀).
[phases.build]
cmds = ["python -m playwright install --with-deps chromium || true"]
